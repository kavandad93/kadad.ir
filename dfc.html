<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chat</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .msg {
      margin: 10px 0;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    .user {
      background: #00ff88;
      color: black;
      margin-left: auto;
    }

    .ai {
      background: #222;
      margin-right: auto;
    }

    .input-area {
      display: flex;
      padding: 10px;
      background: #111;
      border-top: 1px solid #333;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #00ff88;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="chat" id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Type a message..." />
  <button onclick="send()">Send</button>
</div>

<script>
const API_URL = "https://quiet-salad-455b.kavandadkhah.workers.dev";

const chat = document.getElementById("chat");

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      messages: [
        { role: "user", content: text }
      ]
    })
  });

  const data = await res.json();

  const reply = data.response || JSON.stringify(data, null, 2);

  addMsg(reply, "ai");
}
</script>

</body>
</html>
