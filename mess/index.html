<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kadad Messenger</title>
<style>
@font-face{font-family:Yekan;src:url('B-YEKAN.ttf')}
*{box-sizing:border-box}body{margin:0;font-family:Yekan,Arial;background:#111 url('BG.png') center/cover fixed;color:#fff;height:100vh;display:flex;align-items:center;justify-content:center}
.app{width:95%;max-width:900px;height:90vh;background:#18222dca;backdrop-filter:blur(15px);border-radius:25px;overflow:hidden;display:flex;box-shadow:0 20px 60px #0008}
.sidebar{width:300px;background:#101820aa;padding:20px}.logo{font-size:28px;margin-bottom:20px}.chat{padding:15px;border-radius:15px;background:#263746;margin:10px 0;cursor:pointer}.main{flex:1;display:flex;flex-direction:column}.header{padding:20px;background:#229ed9;font-size:22px}.messages{flex:1;padding:20px;overflow:auto}.msg{background:#263746;padding:12px 18px;border-radius:18px;margin:12px 0;width:max-content;max-width:80%}.me{background:#229ed9;margin-right:auto}.send{display:flex;padding:15px;background:#101820}.send input{flex:1;padding:15px;border:0;border-radius:20px;background:#fff}.send button{margin-right:10px;border:0;border-radius:50%;width:50px;background:#229ed9;color:white;font-size:20px}
@media(max-width:700px){.sidebar{display:none}.app{height:100vh;width:100%;border-radius:0}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar"><div class="logo">💬 کاداد مسنجر</div><div class="chat">👤 گفتگوی جدید</div><div class="chat">🤖 دستیار کاداد</div></aside>
<section class="main"><div class="header">کاداد Messenger</div><div class="messages" id="messages"><div class="msg">سلام 👋 به پیام‌رسان کاداد خوش آمدید</div></div><div class="send"><input id="text" placeholder="پیام بنویسید..."><button onclick="send()">➤</button></div></section>
</div>
<script>function send(){let i=document.getElementById('text');if(i.value){let m=document.createElement('div');m.className='msg me';m.textContent=i.value;document.getElementById('messages').appendChild(m);i.value='';}}</script>
</body>
</html>
